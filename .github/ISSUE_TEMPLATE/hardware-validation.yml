name: Hardware Validation Report
description: Share release validation evidence from a Mac running Vifty
title: "[Hardware]: "
labels: ["hardware-validation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping validate Vifty on real hardware. Please run the collector after installing a release build and approving the helper:

        ```sh
        scripts/collect-validation-evidence.sh --app /Applications/Vifty.app
        ```

        For source-first `v1.1.0` reports, add `--install-source source-build-tag --source-ref v1.1.0 --source-sha f7d2c636ebf582ac3809998c3fac819d5d87eb72` when you built from source, or `--install-source source-first-unsigned-dev-zip --source-ref v1.1.0 --source-sha f7d2c636ebf582ac3809998c3fac819d5d87eb72 --source-artifact ./Vifty-v1.1.0-unsigned-dev.zip` when you installed the unsigned tester zip and still have it locally.

        The bundle includes read-only diagnostics plus bundle plist, LaunchDaemon TeamID, signing, notarization, Gatekeeper, and privacy-review evidence for the app, CLI, helper, and daemon. Check privacy-review.tsv before posting publicly; redact files it flags or share them privately with maintainers.

        For `v1.1.0`, choose **Source build from tag** when you built from source, or **Source-first unsigned-dev zip** when you used the tester convenience artifact. Neither path is Developer ID signed, notarized, Homebrew-trusted, or a trusted public binary release.

        Or run these commands manually:

        ```sh
        # Required for supported Apple Silicon MacBook Pro validation:
        /Applications/Vifty.app/Contents/MacOS/viftyctl diagnose --json
        sudo /Applications/Vifty.app/Contents/MacOS/ViftyHelper probeLocal
        ```

        Unsupported machines should follow docs/unsupported-hardware.md and collect read-only evidence only. A `viftyctl diagnose --json` report showing the hardware gate is enough for unsupported safe-block reports. Only run the manual fan write smoke test on supported Apple Silicon MacBook Pro hardware, and restore Auto afterward.

  - type: input
    id: vifty-version
    attributes:
      label: Vifty version
      description: Which Vifty release or commit did you install?
      placeholder: e.g. 1.0.0 or git commit SHA
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      description: How did you install this build? For v1.1.0, prefer Source build from tag or Source-first unsigned-dev zip; do not choose notarized or Homebrew unless a future trusted-binary release actually provided that path.
      options:
        - Source build from tag
        - Source-first unsigned-dev zip
        - Notarized GitHub Release
        - Homebrew cask
        - Local Developer ID build
        - Local ad-hoc build
        - Other
    validations:
      required: true

  - type: input
    id: source-provenance
    attributes:
      label: Source/ref or artifact checksum
      description: For source-first reports, paste the tag/ref, immutable source commit SHA, and the unsigned-dev zip SHA-256 if applicable. These should match install-provenance.tsv.
      placeholder: e.g. v1.1.0 / f7d2c636ebf582ac3809998c3fac819d5d87eb72 / Vifty-v1.1.0-unsigned-dev.zip sha256 ...
    validations:
      required: false

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Which macOS version did you test on?
      placeholder: e.g. 15.5
    validations:
      required: true

  - type: input
    id: model-identifier
    attributes:
      label: Model identifier
      description: Paste the exact model identifier from the diagnose JSON or System Information.
      placeholder: e.g. MacBookPro18,3
    validations:
      required: true

  - type: dropdown
    id: hardware-family
    attributes:
      label: Hardware family
      description: Choose the closest matching model family.
      options:
        - M1 Pro/Max MacBook Pro
        - M2 Pro/Max MacBook Pro
        - M3 Pro/Max MacBook Pro
        - M4 Pro/Max MacBook Pro
        - M5 Pro/Max MacBook Pro
        - Apple Silicon non-MacBook-Pro
        - Intel MacBook Pro
        - Other
    validations:
      required: true

  - type: dropdown
    id: readiness-state
    attributes:
      label: Readiness state
      description: What `state` did `viftyctl diagnose --json` report?
      options:
        - ready
        - degraded
        - blocked
    validations:
      required: true

  - type: textarea
    id: diagnose-json
    attributes:
      label: viftyctl diagnose --json
      description: Paste the full JSON output. This command is read-only.
      render: json
      placeholder: |
        {
          "state": "ready",
          "modelIdentifier": "MacBookPro18,3",
          "checks": []
        }
    validations:
      required: true

  - type: textarea
    id: probe-local
    attributes:
      label: ViftyHelper probeLocal output (supported hardware)
      description: Paste this for supported Apple Silicon MacBook Pro validation. Unsupported safe-block reports may leave this blank when `viftyctl diagnose --json` already shows the hardware gate.
      render: text
      placeholder: |
        model=MacBookPro18,3 appleSilicon=true macBookPro=true
        fans=2
        fan[0] name="Left Fan" rpm=2100 min=1400 max=6000 controllable=true
    validations:
      required: false

  - type: dropdown
    id: manual-smoke
    attributes:
      label: Manual fan write smoke test
      description: Did you run the short lease/manual fan write smoke test from docs/hardware-validation.md?
      options:
        - Passed and Auto restore confirmed
        - Skipped because readiness was blocked
        - Skipped because hardware is unsupported
        - Failed
    validations:
      required: true

  - type: textarea
    id: manual-smoke-notes
    attributes:
      label: Manual smoke test notes
      description: If you ran the smoke test, include prepare/restore output and any observed fan mode or target changes.
      render: text
      placeholder: |
        prepare: ...
        diagnose during lease: ...
        restore-auto: ...
        final diagnose: ...
    validations:
      required: false

  - type: textarea
    id: release-trust-evidence
    attributes:
      label: Release trust evidence
      description: Paste review-summary.tsv rows, attach review-summary.json, install-provenance.tsv, privacy-review.tsv, review-result.json if maintainers already ran scripts/review-validation-evidence.sh, bundle-executables.tsv, schema-resources.tsv, capabilities-schema-resources.tsv, capabilities-contract.tsv, and release-artifact-summary.tsv/json when available, or attach files for app-info-plist, launchdaemon-teamid, codesign-*, spctl-assess-app, and stapler-validate-app. Maintainers should be able to run scripts/review-validation-evidence.sh against the attached bundle. The privacy-review row should be 0 before public sharing; redact or share privately if it names hostnames, /Users/... paths, serial-number labels, or hardware UUID labels. The install-provenance row should be 0 and should not be used to treat source-first or unsigned-dev installs as release-trust evidence. The capabilities-contract row should be 0 so agent wrappers can rely on the installed CLI contract. Source-first source builds and unsigned-dev reports may skip release-artifact-summary evidence; trusted binary release reports should include it and the row should be 0 so the verifier result passed and matched the installed app version.
      render: text
      placeholder: |
        name	status	expected	scope	note
        app-info-plist	0	0	release-and-hardware	Bundle metadata identifies the tested app version.
        install-provenance	0	0	source-and-release-trust	Records install source, source ref/SHA, and optional artifact checksum without implying binary trust.
        bundle-executables	0	0	release-and-hardware	Bundled app/helper/daemon/CLI executables should be present, executable, and hashed.
        privacy-review	0	0	release-and-hardware	Review captured files for likely hostnames, /Users/... paths, serial-number labels, or hardware UUID labels before public sharing.
        release-artifact-summary	0	0 or skipped	release-trust	Optional verifier summary should pass and match the installed app version when supplied.
        schema-resources	0	0	agent-contract	Bundled viftyctl JSON Schemas should be present and hashed.
        capabilities-schema-resources	0	0	agent-contract	Capabilities output should advertise installed schema resource paths.
        capabilities-contract	0	0	agent-contract	Capabilities output should advertise the safe run lifecycle, direct prepare/restore lifecycle, and supervised force-retry support.
        launchdaemon-teamid	0	0 for public release	release-trust	Public releases should expose VIFTY_XPC_ALLOWED_TEAM_ID; ad-hoc builds may be empty.
        spctl-assess-app	0	0 for public release	release-trust	Gatekeeper assessment should pass for notarized releases.
    validations:
      required: false

  - type: checkboxes
    id: safety-confirmations
    attributes:
      label: Safety confirmations
      options:
        - label: I restored Auto after any manual or agent cooling test.
          required: true
        - label: I stopped testing if diagnose reported critical thermal pressure, missing sensors, missing controllable fans, or invalid RPM ranges.
          required: true
        - label: I understand this report is compatibility evidence, not a request to bypass Vifty's hardware safety gates.
          required: true

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional notes
      description: Anything else useful about this machine, install path, signing/notarization, helper approval, or fan behavior.
    validations:
      required: false
