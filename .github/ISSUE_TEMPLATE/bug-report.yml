name: Bug Report
description: Report a bug in Vifty
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not open public issues for security vulnerabilities. Use GitHub Security Advisories instead.

        For fan, sensor, helper, or agent-cooling bugs, start with read-only diagnostics where possible.

        Maintainers triage reports using docs/support-triage.md so helper, hardware, SMC telemetry, release-trust, and agent-cooling issues get the right evidence.

        If `viftyctl diagnose --json` reports unsupported hardware or `safeToRequestCooling: false`, do not run manual fan-write commands or raw SMC tools. Use the diagnose JSON as the first evidence, and leave helper probe output blank unless a maintainer asks for it.

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Which version of macOS are you running?
      placeholder: e.g. 15.4
    validations:
      required: true

  - type: dropdown
    id: mac-model
    attributes:
      label: Mac model
      description: What kind of Mac are you using?
      options:
        - Apple Silicon MacBook Pro
        - Apple Silicon non-MacBook-Pro
        - Intel MacBook Pro
        - Intel non-MacBook-Pro
    validations:
      required: true

  - type: input
    id: vifty-version
    attributes:
      label: Vifty version
      description: Which version of Vifty are you running?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: readiness-diagnostics
    attributes:
      label: Readiness diagnostics
      description: |
        If the bug involves fan speed, temperature readings, helper install, or agent/build/test cooling, paste:
        `/Applications/Vifty.app/Contents/MacOS/viftyctl diagnose --json`
      render: json
      placeholder: |
        {
          "state": "blocked",
          "checks": []
        }
    validations:
      required: false

  - type: textarea
    id: helper-probe
    attributes:
      label: Helper probe output
      description: |
        For supported Apple Silicon MacBook Pro hardware/sensor/fan bugs, paste the output of:
        `sudo /Applications/Vifty.app/Contents/MacOS/ViftyHelper probeLocal`
        Unsupported or blocked safe-block reports may leave this blank when `viftyctl diagnose --json` already shows the hardware gate.
      render: text
      placeholder: |
        model=MacBookPro18,3 appleSilicon=true macBookPro=true
        fans=2
        fan[0] name="Left Fan" rpm=2100 min=1400 max=6000 controllable=true
    validations:
      required: false

  - type: textarea
    id: agent-command
    attributes:
      label: Agent or build/test command
      description: If the bug involves `viftyctl prepare`, `restore-auto`, or `run`, paste the exact command and stdout/stderr.
      render: shell
      placeholder: |
        /Applications/Vifty.app/Contents/MacOS/viftyctl run --workload test --duration 20m --max-rpm-percent 70 -- swift test
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Vifty
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
